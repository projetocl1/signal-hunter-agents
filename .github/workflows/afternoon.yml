name: afternoon_scan

on:
  schedule:
    - cron: "0 14 * * *"   # 14:00 UTC — sector rotation + macro
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Sanitizar secrets (remover newlines)
        run: |
          ANTHROPIC_CLEAN=$(echo "${{ secrets.ANTHROPIC_API_KEY }}" | tr -d '\n\r' | xargs)
          AIRTABLE_TOKEN_CLEAN=$(echo "${{ secrets.AIRTABLE_TOKEN }}" | tr -d '\n\r' | xargs)
          AIRTABLE_BASE_CLEAN=$(echo "${{ secrets.AIRTABLE_BASE_ID }}" | tr -d '\n\r' | xargs)
          echo "ANTHROPIC_API_KEY=${ANTHROPIC_CLEAN}" >> $GITHUB_ENV
          echo "AIRTABLE_TOKEN=${AIRTABLE_TOKEN_CLEAN}" >> $GITHUB_ENV
          echo "AIRTABLE_BASE_ID=${AIRTABLE_BASE_CLEAN}" >> $GITHUB_ENV

      - name: Correr afternoon_scan
        run: python -m agents.afternoon_scan
