name: close_scan

on:
  schedule:
    - cron: "0 21 * * *"   # 21:00 UTC — after-hours earnings + briefing diário
  workflow_dispatch:

permissions:
  contents: write          # necessário para commitar o briefing gerado

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Correr close_scan (scan + briefing)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: python -m agents.close_scan

      - name: Commitar briefing diário
        run: |
          git config user.name "signal-hunter-bot"
          git config user.email "bot@users.noreply.github.com"
          git add briefings/*.md
          if git diff --staged --quiet; then
            echo "Sem briefing novo para commitar."
          else
            git commit -m "briefing: $(date -u +%Y-%m-%d)"
            git push
          fi
