name: update_performance

on:
  schedule:
    - cron: "0 22 * * 5"   # sexta às 22:00 UTC — após fecho de semana
  workflow_dispatch:

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Actualizar cache de performance
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: python -m scripts.update_performance

      - name: Commit cache actualizado
        run: |
          git config user.name "signal-hunter-bot"
          git config user.email "bot@signal-hunter"
          git add data/performance_cache.json
          git diff --staged --quiet || git commit -m "chore: actualizar cache de performance [skip ci]"
          git push
